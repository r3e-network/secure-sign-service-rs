# Configuration for cargo-deny
# Documentation: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore specific advisories if needed
ignore = [
    # Temporarily ignore unmaintained serde_cbor (used by AWS Nitro dependency)
    "RUSTSEC-2021-0127",
    # Ignore tokio broadcast issue (doesn't affect our usage pattern)
    "RUSTSEC-2025-0023",
]

[licenses]
# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
]

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"

# Allow specific duplicate dependencies that are common in ecosystem
skip = [
    # Windows system dependencies - different versions for compatibility
    { name = "wasi", version = "=0.11.0" },
    { name = "windows-sys", version = "=0.48.0" },
    { name = "windows-targets", version = "=0.48.5" },
    { name = "windows_aarch64_gnullvm", version = "=0.48.5" },
    { name = "windows_aarch64_msvc", version = "=0.48.5" },
    { name = "windows_i686_gnu", version = "=0.48.5" },
    { name = "windows_i686_msvc", version = "=0.48.5" },
    { name = "windows_x86_64_gnu", version = "=0.48.5" },
    { name = "windows_x86_64_gnullvm", version = "=0.48.5" },
    { name = "windows_x86_64_msvc", version = "=0.48.5" },
    # Crypto and system libraries - version differences due to ecosystem evolution
    { name = "bitflags", version = "=1.3.2" },
    { name = "block-buffer", version = "=0.7.3" },
    { name = "digest", version = "=0.8.1" },
    { name = "generic-array", version = "=0.12.4" },
    { name = "getrandom", version = "=0.2.15" },
    { name = "hashbrown", version = "=0.12.3" },
    { name = "hmac", version = "=0.7.1" },
    { name = "indexmap", version = "=1.9.3" },
    { name = "memoffset", version = "=0.7.1" },
    { name = "nix", version = "=0.26.4" },
    { name = "opaque-debug", version = "=0.2.3" },
    { name = "sha2", version = "=0.8.2" },
    { name = "subtle", version = "=1.0.0" },
    { name = "tower", version = "=0.4.13" },
]

[sources]
# Only allow crates from these sources
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"] 