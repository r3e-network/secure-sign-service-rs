groups:
  - name: secure-sign-alerts
    rules:
      # Service availability
      - alert: SecureSignServiceDown
        expr: up{job="secure-sign"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Secure Sign Service is down"
          description: "The Secure Sign Service has been down for more than 30 seconds."

      # High error rate
      - alert: SecureSignHighErrorRate
        expr: rate(http_requests_total{job="secure-sign",status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in Secure Sign Service"
          description: "Error rate is {{ $value }} errors per second over the last 5 minutes."

      # High memory usage
      - alert: SecureSignHighMemoryUsage
        expr: (process_resident_memory_bytes{job="secure-sign"} / 1024 / 1024) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in Secure Sign Service"
          description: "Memory usage is {{ $value }}MB, which is above the 100MB threshold."

      # Certificate expiration (if applicable)
      - alert: SecureSignCertificateExpiring
        expr: (ssl_certificate_expiry_timestamp{job="secure-sign"} - time()) / 86400 < 30
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate will expire in {{ $value }} days."

      # High request rate (potential DoS)
      - alert: SecureSignHighRequestRate
        expr: rate(http_requests_total{job="secure-sign"}[1m]) > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high request rate"
          description: "Request rate is {{ $value }} requests per second, which may indicate a DoS attack."

      # Signing operation failures
      - alert: SecureSignSigningFailures
        expr: rate(signing_operations_total{job="secure-sign",status="failed"}[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Signing operations failing"
          description: "Signing failure rate is {{ $value }} per second."

      # Wallet not decrypted
      - alert: SecureSignWalletNotDecrypted
        expr: wallet_decrypted{job="secure-sign"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Wallet not decrypted"
          description: "The service is running but the wallet is not decrypted and ready for signing."

  - name: system-alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 5 minutes."

      # High disk usage
      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{fstype!="tmpfs"} - node_filesystem_free_bytes{fstype!="tmpfs"}) / node_filesystem_size_bytes{fstype!="tmpfs"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 85% on {{ $labels.device }}."

      # Out of memory
      - alert: OutOfMemory
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "System out of memory"
          description: "Memory usage is above 90%." 