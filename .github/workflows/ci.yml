name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (TCP)
        run: cargo clippy --all-targets --features tcp --no-default-features -- -D warnings

      - name: Run clippy (VSOCK)  
        run: cargo clippy --all-targets --features vsock --no-default-features -- -D warnings

      - name: Check documentation
        run: cargo doc --all --no-deps --document-private-items

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run security audit
        run: cargo audit

      - name: Check for unsafe code
        run: |
          if grep -r "unsafe" --include="*.rs" secure-sign-core/src/ secure-sign-rpc/src/ secure-sign/src/; then
            echo "❌ Unsafe code found in core modules"
            exit 1
          else
            echo "✅ No unsafe code found in core modules"
          fi

  # Comprehensive Testing
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest]
        rust: [stable, beta]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macOS-latest'
        run: brew install protobuf

      - name: Run tests (TCP)
        run: cargo test --all --features tcp --no-default-features

      - name: Run tests (VSOCK)
        run: cargo test --all --features vsock --no-default-features

      - name: Run doc tests
        run: cargo test --doc --all

      - name: Test with minimal features
        run: cargo test --no-default-features

  # Build Testing
  build:
    name: Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: 
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc and musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools

      - name: Build for target
        run: cargo build --release --target ${{ matrix.target }} --features tcp --no-default-features

      - name: Test binary runs
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          timeout 5s ./target/${{ matrix.target }}/release/secure-sign --help || true
          echo "✅ Binary executes successfully"

  # Docker Build and Security Scan
  docker:
    name: Docker Build & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: secure-sign:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-sign:test'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Test Docker container
        run: |
          # Test that container starts and help works
          docker run --rm secure-sign:test --help

  # Release Build (only on release)
  release:
    name: Release Build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [quality, security, test, build, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools

      - name: Build release binaries
        run: |
          # TCP version
          cargo build --release --target x86_64-unknown-linux-musl --features tcp --no-default-features
          cp target/x86_64-unknown-linux-musl/release/secure-sign secure-sign-tcp-linux
          
          # VSOCK version  
          cargo build --release --target x86_64-unknown-linux-musl --features vsock --no-default-features
          cp target/x86_64-unknown-linux-musl/release/secure-sign secure-sign-vsock-linux

      - name: Generate checksums
        run: |
          sha256sum secure-sign-tcp-linux > secure-sign-tcp-linux.sha256
          sha256sum secure-sign-vsock-linux > secure-sign-vsock-linux.sha256

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./secure-sign-tcp-linux
          asset_name: secure-sign-tcp-linux
          asset_content_type: application/octet-stream

      - name: Upload VSOCK binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./secure-sign-vsock-linux
          asset_name: secure-sign-vsock-linux
          asset_content_type: application/octet-stream

      - name: Upload checksums
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./secure-sign-tcp-linux.sha256
          asset_name: secure-sign-tcp-linux.sha256
          asset_content_type: text/plain 