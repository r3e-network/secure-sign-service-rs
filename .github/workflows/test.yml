name: Test SGX and Nitro

on:
  push:
    branches: [ main, develop, docs ]
  pull_request:
    branches: [ main, develop, docs ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-sgx-simulation:
    name: Test SGX in Simulation Mode
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: x86_64-unknown-linux-musl
        components: rust-src
        
    - name: Install additional targets
      run: rustup target add x86_64-unknown-linux-musl

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-sgx-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-sgx-

    - name: Install Intel SGX SDK
      run: |
        # Download and install Intel SGX SDK
        wget -q https://download.01.org/intel-sgx/sgx-linux/2.24/distro/ubuntu20.04-server/sgx_linux_x64_sdk_2.24.100.3.bin
        chmod +x sgx_linux_x64_sdk_2.24.100.3.bin
        echo 'yes' | sudo ./sgx_linux_x64_sdk_2.24.100.3.bin --prefix=/opt/intel
        
        # Install required packages
        sudo apt-get update
        sudo apt-get install -y build-essential ocaml ocamlbuild automake autoconf libtool wget python3 libssl-dev git cmake perl protobuf-compiler
        
        # Source SGX environment
        source /opt/intel/sgxsdk/environment

    - name: Create test wallet and signing key
      run: |
        # Create a test NEP6 wallet file
        mkdir -p test-data
        cat > test-data/test_wallet.json << 'EOF'
        {
          "name": "test-wallet",
          "version": "1.0",
          "scrypt": {
            "n": 16384,
            "r": 8,
            "p": 8
          },
          "accounts": [
            {
              "address": "NiNmXL8FjEUEs1nfX9uHFBNaenxDHJtmuB",
              "label": "test-account",
              "isDefault": true,
              "lock": false,
              "key": "6PYVPVe1fQznphjbUxXP9KZJqPMVnVwCx5s5pr5axRJ8uHkMtZg97eT5kL",
              "contract": {
                "script": "0c2102028a99826edc0c97d18e22b6932373d908d323aa7f92656a77ec26e8861699ef",
                "parameters": [
                  {
                    "name": "signature",
                    "type": "Signature"
                  }
                ],
                "deployed": false
              },
              "extra": null
            }
          ],
          "extra": null
        }
        EOF
        
        # Create a test SGX signing key
        openssl genrsa -out test-data/sgx_sign_private_key.pem -3 3072

    - name: Build SGX enclave in simulation mode
      run: |
        source /opt/intel/sgxsdk/environment
        export SGX_MODE=SW
        export SGX_DEBUG=true
        
        # Build the enclave
        cd secure-sign-sgx-enclave
        chmod +x build.sh
        ./build.sh --wallet-path ../test-data/test_wallet.json --sign-key ../test-data/sgx_sign_private_key.pem --sgx-mode SW --sgx-debug

    - name: Build SGX application
      run: |
        source /opt/intel/sgxsdk/environment
        export SGX_MODE=SW
        
        # Build the SGX application
        cd secure-sign-sgx
        chmod +x build.sh
        ./build.sh --sgx-mode SW

    - name: Test SGX application
      run: |
        source /opt/intel/sgxsdk/environment
        export SGX_MODE=SW
        
        # Test that the SGX binary was built successfully
        if [ ! -f "secure-sign-sgx/target/secure-sign-sgx" ]; then
          echo "SGX binary not found!"
          exit 1
        fi
        
        # Test that the enclave was built successfully
        if [ ! -f "secure-sign-sgx-enclave/secure_sign_sgx_enclave.signed.so" ]; then
          echo "SGX enclave not found!"
          exit 1
        fi
        
        # Run a basic test (this will test the binary can start)
        timeout 10s ./secure-sign-sgx/target/secure-sign-sgx --help || true
        
        echo "SGX simulation test completed successfully!"

  test-nitro-simulation:
    name: Test AWS Nitro (Simulation)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-musl
        
    - name: Install additional targets
      run: rustup target add x86_64-unknown-linux-musl

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nitro-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nitro-

    - name: Install Docker
      run: |
        # Use Docker's official installation script to avoid conflicts
        curl -fsSL https://get.docker.com -o get-docker.sh
        sudo sh get-docker.sh
        sudo systemctl start docker
        sudo usermod -aG docker $USER
        # Test Docker installation
        sudo docker --version

    - name: Install Nitro CLI (for build simulation)
      run: |
        # Install AWS CLI and Nitro CLI dependencies
        sudo apt-get update
        sudo apt-get install -y python3-pip protobuf-compiler
        pip3 install awscli
        
        # Install Nitro CLI (optional - don't fail if it doesn't work)
        echo "Attempting to install Nitro CLI..."
        if wget -q https://github.com/aws/aws-nitro-enclaves-cli/releases/download/v1.2.2/nitro-cli_1.2.2_amd64.deb; then
          if sudo dpkg -i nitro-cli_1.2.2_amd64.deb; then
            echo "Nitro CLI installed successfully"
          else
            echo "Nitro CLI dpkg failed, attempting to fix dependencies..."
            sudo apt-get install -f -y || echo "Failed to fix dependencies, continuing without Nitro CLI"
          fi
        else
          echo "Failed to download Nitro CLI, continuing without it"
        fi
        
        # Create a dummy nitro-cli if installation failed
        if ! command -v nitro-cli &> /dev/null; then
          echo "Creating dummy nitro-cli for testing..."
          sudo tee /usr/local/bin/nitro-cli > /dev/null << 'NITRO_EOF'
        #!/bin/bash
        echo "nitro-cli (dummy) 1.0.0"
        echo "Note: This is a dummy implementation for CI testing"
        if [ "$1" = "--version" ]; then
          exit 0
        fi
        echo "Error: Actual Nitro CLI not available in CI environment"
        exit 1
        NITRO_EOF
          sudo chmod +x /usr/local/bin/nitro-cli
        fi
        
        # Verify installations
        echo "Verifying installations..."
        aws --version || echo "AWS CLI not available"
        nitro-cli --version || echo "Nitro CLI not available"

    - name: Create test wallet
      run: |
        # Create a test NEP6 wallet file
        mkdir -p test-data
        cat > test-data/test_wallet.json << 'EOF'
        {
          "name": "test-wallet",
          "version": "1.0",
          "scrypt": {
            "n": 16384,
            "r": 8,
            "p": 8
          },
          "accounts": [
            {
              "address": "NiNmXL8FjEUEs1nfX9uHFBNaenxDHJtmuB",
              "label": "test-account",
              "isDefault": true,
              "lock": false,
              "key": "6PYVPVe1fQznphjbUxXP9KZJqPMVnVwCx5s5pr5axRJ8uHkMtZg97eT5kL",
              "contract": {
                "script": "0c2102028a99826edc0c97d18e22b6932373d908d323aa7f92656a77ec26e8861699ef",
                "parameters": [
                  {
                    "name": "signature",
                    "type": "Signature"
                  }
                ],
                "deployed": false
              },
              "extra": null
            }
          ],
          "extra": null
        }
        EOF

    - name: Build VSOCK binary for Nitro
      run: |
        # Build the VSOCK binary
        make vsock

    - name: Test Nitro Docker build (simulation)
      run: |
        # Test that the VSOCK binary was built
        if [ ! -f "target/secure-sign-vsock" ]; then
          echo "VSOCK binary not found!"
          exit 1
        fi
        
        # Test Docker build process (without actually creating EIF)
        cd scripts/nitro
        chmod +x build.sh
        
        # Copy required files
        cp ../../target/secure-sign-vsock .
        cp ../../test-data/test_wallet.json .
        
        # Test Docker build
        BIN_NAME=$(basename ../../target/secure-sign-vsock)
        WALLET_NAME=$(basename ../../test-data/test_wallet.json)
        
        echo "Building docker image with binary $BIN_NAME and wallet $WALLET_NAME"
        docker build --build-arg BIN=$BIN_NAME --build-arg WALLET=$WALLET_NAME -t secure-sign-nitro-test .
        
        # Test that the Docker image was built successfully
        docker images | grep secure-sign-nitro-test
        
        # Clean up
        docker rmi secure-sign-nitro-test
        
        echo "Nitro simulation test completed successfully!"

  test-basic-functionality:
    name: Test Basic Functionality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-musl
        
    - name: Install additional targets
      run: rustup target add x86_64-unknown-linux-musl

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-basic-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-basic-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Run cargo tests
      run: |
        # Run unit tests
        echo "Running unit tests..."
        cargo test --workspace --verbose --lib
        
        # Run integration tests
        echo "Running integration tests..."
        cargo test --workspace --verbose --tests
        
        # Run doc tests
        echo "Running documentation tests..."
        cargo test --workspace --verbose --doc
        
        # Run all tests together for final verification
        echo "Running all tests together..."
        cargo test --workspace --verbose

    - name: Run cargo clippy
      run: |
        # Run clippy for workspace without conflicting features
        cargo clippy --workspace --all-targets -- -D warnings
        # Run clippy specifically for secure-sign with tcp feature
        cargo clippy -p secure-sign --all-targets --features tcp -- -D warnings
        # Run clippy specifically for secure-sign with vsock feature
        cargo clippy -p secure-sign --all-targets --features vsock -- -D warnings
        # Run clippy specifically for secure-sign with tools feature
        cargo clippy -p secure-sign --all-targets --features tools -- -D warnings

    - name: Check formatting
      run: |
        # Check formatting for all files except generated protobuf files
        # First, backup the protobuf files to avoid formatting them
        cp secure-sign-rpc/src/servicepb.rs secure-sign-rpc/src/servicepb.rs.bak
        cp secure-sign-rpc/src/startpb.rs secure-sign-rpc/src/startpb.rs.bak
        
        # Run cargo fmt check
        if ! cargo fmt --all -- --check; then
          echo "Formatting check failed. Checking if only protobuf files are affected..."
          
          # Restore protobuf files to their original state
          mv secure-sign-rpc/src/servicepb.rs.bak secure-sign-rpc/src/servicepb.rs
          mv secure-sign-rpc/src/startpb.rs.bak secure-sign-rpc/src/startpb.rs
          
          # Check if any non-protobuf files have formatting issues
          cargo fmt --all
          if git diff --name-only | grep -v "secure-sign-rpc/src/servicepb.rs" | grep -v "secure-sign-rpc/src/startpb.rs" | grep "\.rs$"; then
            echo "Non-protobuf files have formatting issues:"
            git diff --name-only | grep -v "secure-sign-rpc/src/servicepb.rs" | grep -v "secure-sign-rpc/src/startpb.rs" | grep "\.rs$"
            exit 1
          else
            echo "Only protobuf files have formatting differences, which is expected"
            # Restore the original protobuf files
            git checkout -- secure-sign-rpc/src/servicepb.rs secure-sign-rpc/src/startpb.rs
            exit 0
          fi
        else
          # Clean up backup files if formatting check passed
          rm -f secure-sign-rpc/src/servicepb.rs.bak secure-sign-rpc/src/startpb.rs.bak
          echo "All files are properly formatted"
        fi

    - name: Build TCP version (for testing)
      run: |
        make tcp

    - name: Test TCP binary
      run: |
        # Test that the TCP binary was built
        if [ ! -f "target/secure-sign-tcp" ]; then
          echo "TCP binary not found!"
          exit 1
        fi
        
        # Run basic help test
        timeout 10s ./target/secure-sign-tcp --help || true
        
        echo "Basic functionality test completed successfully!"

  test-documentation:
    name: Test Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install Python and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip protobuf-compiler
        cd docs
        pip3 install -r requirements.txt

    - name: Test Rust documentation
      run: |
        # Generate Rust documentation with verbose output to debug any issues
        echo "Generating Rust documentation..."
        cargo doc --no-deps --document-private-items --all --verbose
        
        # Verify the documentation was generated
        if [ -d "target/doc" ]; then
          echo "Rust documentation generated successfully at target/doc/"
          ls -la target/doc/
        else
          echo "ERROR: target/doc directory not found after cargo doc"
          echo "Checking if target directory exists:"
          ls -la target/ || echo "target directory does not exist"
          exit 1
        fi

    - name: Test MkDocs build
      run: |
        # Run MkDocs from project root with explicit config path
        python -m mkdocs build --config-file docs/mkdocs.yml

    - name: Check documentation files
      run: |
        # Check that Rust docs were generated
        if [ ! -d "target/doc" ]; then
          echo "Rust documentation not generated!"
          exit 1
        fi
        
        # Check that MkDocs site was generated (in site/ directory from project root)
        if [ ! -d "site" ]; then
          echo "MkDocs site not generated!"
          exit 1
        fi
        
        echo "Documentation test completed successfully!"